app = "tasklists-app"
primary_region = "lhr"

[build]

[env]
  PORT = "3001"
  DATA_DIR = "/data"

[[mounts]]
  source = "tasklists_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
